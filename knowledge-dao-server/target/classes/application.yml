server:
  port: 8080

spring:
  application:
    name: knowledge-dao
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:knowledge}
    username: ${DB_USERNAME:dou}
    password: ${DB_PASSWORD:chqiuu2026}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.knowledge.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# Ollama embedding config
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  embedding-model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
  embedding-dimension: ${OLLAMA_EMBEDDING_DIMENSION:1024}

# Swagger / Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: Knowledge DAO API
    description: 本地 RAG 知识库 API 文档
    version: 2.0.0
    contact:
      name: rag-dev

logging:
  level:
    com.knowledge: DEBUG
